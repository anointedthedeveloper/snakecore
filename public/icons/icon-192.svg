<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" fill="#0a0a0f" rx="32"/>
  <!-- Snake body segments -->
  <rect x="24" y="84" width="36" height="36" rx="6" fill="#00f0ff" opacity="0.4"/>
  <rect x="60" y="84" width="36" height="36" rx="6" fill="#00f0ff" opacity="0.6"/>
  <rect x="96" y="84" width="36" height="36" rx="6" fill="#00f0ff" opacity="0.8"/>
  <rect x="96" y="48" width="36" height="36" rx="6" fill="#00f0ff" opacity="0.9"/>
  <rect x="132" y="48" width="36" height="36" rx="6" fill="#39ff14"/>
  <!-- Eyes -->
  <circle cx="144" cy="58" r="5" fill="#0a0a0f"/>
  <circle cx="158" cy="58" r="5" fill="#0a0a0f"/>
  <!-- Food -->
  <rect x="24" y="132" width="24" height="24" rx="4" fill="#ff2d78"/>
  <!-- Glow effect via filter -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>
